# .github/workflows/deploy-scripts.yml

name: Deploy Scripts

on:
  workflow_call:


jobs:
  deploy-scripts:
    runs-on: ${{ vars.RUNNER_LABEL || 'arc-runner-set-eks' }}
    env:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      STORAGE_ACCOUNT_NAME: ${{ vars.STORAGE_ACCOUNT_NAME }}
      STORAGE_ACCOUNT_ACCESS_KEY: ${{ secrets.STORAGE_ACCOUNT_ACCESS_KEY }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      CUSTOMER_ENVIRONMENT: ${{ vars.CUSTOMER_ENVIRONMENT }}
      BRANCH_NAME: ${{ github.head_ref || github.ref_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      # This is where the magic happens - one simple action call!
      - name: Process Branch Configuration
        uses: invent-ai/actions-workflow-templates/.github/actions/process-config@composite-test
        with:
          branch-name: ${{ github.head_ref || github.ref_name }}
          customer-name: ${{ vars.CUSTOMER_NAME }}
          customer-environment: ${{ vars.CUSTOMER_ENVIRONMENT }}
          customer-subdomain: ${{ vars.CUSTOMER_SUBDOMAIN }}
          cloud-provider: ${{ vars.CLOUD_PROVIDER }}
          airflow-version: ${{ vars.AIRFLOW_VERSION }}
          airflow-repo-ref: ${{ vars.AIRFLOW_REPO_REF || 'latest-nginx-ingress-liveness' }}
          k8s-cluster: ${{ vars.K8S_CLUSTER }}
        env:
          AZURE_SUBSCRIPTION_ID_PROD_US: ${{ vars.AZURE_SUBSCRIPTION_ID_PROD_US }}
          AZURE_SUBSCRIPTION_ID_PROD_EU: ${{ vars.AZURE_SUBSCRIPTION_ID_PROD_EU }}
          AZURE_SUBSCRIPTION_ID_DEV: ${{ vars.AZURE_SUBSCRIPTION_ID_DEV }}
          AZURE_DATABRICKS_CLIENT_ID: ${{ secrets.AZURE_DATABRICKS_CLIENT_ID }}


      # Install AWS CLI v2
      - name: Install AWS CLI v2
        run: |
          # Install dependencies for AWS CLI v2
          sudo apt-get update
          sudo apt-get install -y unzip curl

          # Download AWS CLI v2 and install it
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install --update || sudo ./aws/install

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'  # Use your desired Python version

      # - name: Install dependencies
      #   run: |
      #     python -m venv venv
      #     . venv/bin/activate
      #     pip install setuptools wheel
      #     pip install azure-cli==2.46.0 databricks-cli==0.17.5 urllib3==1.26.15

      # Download the Databricks CLI.
      # See https://github.com/databricks/setup-cli
      - name: Databricks CLI Setup
        uses: databricks/setup-cli@main

      - name: Configure AWS Credentials
        if: vars.CLOUD_PROVIDER == 'aws'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          echo "Configuring AWS credentials..."
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws configure set region ${{ secrets.AWS_REGION }}

      # - name: Cache pip packages
      #   uses: actions/cache@v4
      #   with:
      #     path: ~/.cache/pip  # Path where pip caches installed packages
      #     key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements-build.txt') }}--${{ hashFiles('**/requirements-spark.txt') }}
      #     restore-keys: |
      #       ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install invent-warp==1.3.33 --no-cache-dir --index-url http://internal-pypi-server-alb-9235208.eu-west-1.elb.amazonaws.com/simple/ --trusted-host internal-pypi-server-alb-9235208.eu-west-1.elb.amazonaws.com
          pip install numpy==1.21.6
          # pip install -r requirements-build.txt --no-cache-dir --index-url http://internal-pypi-server-alb-9235208.eu-west-1.elb.amazonaws.com/simple/
          # pip install -r requirements-spark.txt --no-cache-dir --index-url http://internal-pypi-server-alb-9235208.eu-west-1.elb.amazonaws.com/simple/


      - name: Generate internal-packages.lock file
        if: vars.CLOUD_PROVIDER == 'aws'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws s3 cp s3://invent-scripts/system-network/pipeline/generate_lock_file.py .
          python generate_lock_file.py --file requirements-spark.txt

      - name: Generate internal-packages.lock file (Azure)
        if: vars.CLOUD_PROVIDER == 'azure'
        run: |
          echo "# No lock file generation for Azure — using pip freeze" > internal-packages.lock

      - name: Install Azure CLI
        if: ${{ vars.CLOUD_PROVIDER }} == 'azure'
        run: |
          curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash

      - name: Azure Login and Upload Files
        if: vars.CLOUD_PROVIDER == 'azure'
        run: |
          echo "Logging in to Azure..."
          az login --service-principal -u ${{ secrets.AZURE_CLIENT_ID }} -p ${{ secrets.AZURE_CLIENT_SECRET }} --tenant ${{ env.AZURE_TENANT_ID }}
          echo "Uploading to Azure Blob Storage..."
          az storage blob upload-batch --account-name ${{ env.STORAGE_ACCOUNT_NAME }} --source scripts --destination $DATASTORE_BUCKET_NAME/src/${{ env.ROCKS_ENV }}/scripts --auth-mode login --overwrite True
          az storage blob upload-batch --account-name ${{ env.STORAGE_ACCOUNT_NAME }} --source rocks_extension --destination $DATASTORE_BUCKET_NAME/src/${{ env.ROCKS_ENV }}/rocks_extension --auth-mode login --overwrite True

      - name: Databricks DBFS Upload (Azure)
        if: vars.CLOUD_PROVIDER == 'azure'
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          # . venv/bin/activate
          echo "Removing old files from DBFS..."
          databricks fs rm dbfs:/FileStore/src/${{ env.ROCKS_ENV }}/ --recursive || true
          echo "Creating DBFS directory if not exists..."
          databricks fs mkdirs dbfs:/FileStore/src/${{ env.ROCKS_ENV }}/scripts/
          databricks fs mkdirs dbfs:/FileStore/src/${{ env.ROCKS_ENV }}/rocks_extension/
          databricks fs mkdirs dbfs:/FileStore/src/${{ env.ROCKS_ENV }}/
          echo "Uploading files to DBFS..."
          databricks fs cp module_runner.py dbfs:/FileStore/src/${{ env.ROCKS_ENV }}/module_runner.py --overwrite
          databricks fs cp scripts/ dbfs:/FileStore/src/${{ env.ROCKS_ENV }}/scripts/ --recursive --overwrite
          databricks fs cp rocks_extension/ dbfs:/FileStore/src/${{ env.ROCKS_ENV }}/rocks_extension/ --recursive --overwrite
          databricks fs cp internal-packages.lock dbfs:/FileStore/src/${{ env.ROCKS_ENV }}/internal_packages.lock --overwrite
          databricks fs cp requirements-spark.txt dbfs:/FileStore/src/${{ env.ROCKS_ENV }}/requirements_spark.txt --overwrite

      # - name: Install Databricks CLI (AWS Only)
      #   if: vars.CLOUD_PROVIDER == 'aws'  # Only runs if CLOUD_PROVIDER is 'aws'
      #   run: |
      #     pip install databricks-cli
      #     databricks --version  # Verify installation

      - name: AWS S3 copy and sync
        if: vars.CLOUD_PROVIDER == 'aws'
        run: |
          aws s3 cp internal-packages.lock s3://${{ env.DATASTORE_BUCKET_NAME }}/src/${{ env.ROCKS_ENV }}/internal-packages.lock
          aws s3 sync . s3://${{ env.DATASTORE_BUCKET_NAME }}/src/${{ env.ROCKS_ENV }}/ \
              --exclude "*" \
              --include "scripts/*" \
              --include "rocks_extension/*" \
              --include "dags/*" \
              --include "module_runner.py" \
              --exclude "*__pycache__*" \
              --delete

      - name: AWS Databricks RM
        if: vars.CLOUD_PROVIDER == 'aws'
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          echo "${DATABRICKS_HOST}
          ${DATABRICKS_TOKEN}" | databricks configure --token

          set +e  # disable immediate exit on error
          databricks fs ls dbfs:/FileStore/src/${{ env.ROCKS_ENV }} > /dev/null 2>&1
          STATUS=$?
          set -e  # re-enable

          if [ $STATUS -eq 0 ]; then
            databricks fs rm dbfs:/FileStore/src/${{ env.ROCKS_ENV }} --recursive
          fi

      - name: AWS Databricks Upload
        if: vars.CLOUD_PROVIDER == 'aws'
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          echo "${DATABRICKS_HOST}
          ${DATABRICKS_TOKEN}" | databricks configure --token
          databricks fs mkdir dbfs:/FileStore/src/${{ env.ROCKS_ENV }}
          databricks fs cp module_runner.py dbfs:/FileStore/src/${{ env.ROCKS_ENV }}/module_runner.py --overwrite
          databricks fs cp scripts/ dbfs:/FileStore/src/${{ env.ROCKS_ENV }}/scripts/ --recursive --overwrite
          databricks fs cp rocks_extension/ dbfs:/FileStore/src/${{ env.ROCKS_ENV }}/rocks_extension/ --recursive --overwrite
          databricks fs cp internal-packages.lock dbfs:/FileStore/src/${{ env.ROCKS_ENV }}/internal_packages.lock --overwrite
          databricks fs cp requirements-spark.txt dbfs:/FileStore/src/${{ env.ROCKS_ENV }}/requirements_spark.txt --overwrite

      - name: AWS S3 Upload
        if: vars.CLOUD_PROVIDER == 'aws'
        run: |
          aws s3 cp module_runner.py s3://${{ env.DATASTORE_BUCKET_NAME }}/src/${{ env.ROCKS_ENV }}/module_runner.py
          aws s3 cp scripts/ s3://${{ env.DATASTORE_BUCKET_NAME }}/src/${{ env.ROCKS_ENV }}/scripts/ --recursive
          aws s3 cp rocks_extension/ s3://${{ env.DATASTORE_BUCKET_NAME }}/src/${{ env.ROCKS_ENV }}/rocks_extension/ --recursive
          aws s3 cp internal-packages.lock s3://${{ env.DATASTORE_BUCKET_NAME }}/src/${{ env.ROCKS_ENV }}/internal_packages.lock
          aws s3 cp requirements-spark.txt s3://${{ env.DATASTORE_BUCKET_NAME }}/src/requirements_spark.txt
