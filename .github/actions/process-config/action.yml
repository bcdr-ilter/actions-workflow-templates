name: 'Process Branch Configuration'
description: 'Process branch-specific configuration using Jinja2-like templating'
inputs:
  branch-name:
    description: 'Branch name to process configuration for'
    required: true
  customer-name:
    description: 'Customer name'
    required: true
  customer-environment:
    description: 'Customer environment (e.g., prod-eu, dev)'
    required: true
  customer-subdomain:
    description: 'Customer subdomain'
    required: false
  cloud-provider:
    description: 'Cloud provider (aws or azure)'
    required: false
    default: 'azure'
  airflow-version:
    description: 'Airflow version'
    required: false
    default: '2.4.2'
  airflow-repo-ref:
    description: 'Airflow repository reference (branch/tag)'
    required: false
    default: 'latest-nginx-ingress-liveness'
  k8s-cluster:
    description: 'Kubernetes cluster name'
    required: false


outputs:
  config-applied:
    description: 'Indicates that configuration was successfully applied'
    value: 'true'

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install Python dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install Jinja2>=3.1.2 PyYAML>=6.0

    - name: Process configuration with Jinja2
      shell: bash
      run: |
        python3 "$GITHUB_ACTION_PATH/process_config.py"
      env:
        INPUT_BRANCH_NAME: ${{ inputs.branch-name }}
        INPUT_CUSTOMER_NAME: ${{ inputs.customer-name }}
        INPUT_CUSTOMER_ENVIRONMENT: ${{ inputs.customer-environment }}
        INPUT_CUSTOMER_SUBDOMAIN: ${{ inputs.customer-subdomain }}
        INPUT_CLOUD_PROVIDER: ${{ inputs.cloud-provider }}
        INPUT_AIRFLOW_VERSION: ${{ inputs.airflow-version }}
        INPUT_AIRFLOW_REPO_REF: ${{ inputs.airflow-repo-ref }}
        INPUT_K8S_CLUSTER: ${{ inputs.k8s-cluster }}
        AZURE_SUBSCRIPTION_ID_PROD_US: ${{ env.AZURE_SUBSCRIPTION_ID_PROD_US }}
        AZURE_SUBSCRIPTION_ID_PROD_EU: ${{ env.AZURE_SUBSCRIPTION_ID_PROD_EU }}
        AZURE_SUBSCRIPTION_ID_DEV: ${{ env.AZURE_SUBSCRIPTION_ID_DEV }}
        AZURE_DATABRICKS_CLIENT_ID: ${{ env.AZURE_DATABRICKS_CLIENT_ID }} 
