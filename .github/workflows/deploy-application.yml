name: Deploy Application

on:
  push:
    branches: [ main, dev, uat ]
  pull_request:
    branches: [ main, dev, uat ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  PYTHON_VERSION: '3.9'
  NODE_VERSION: '18'

jobs:
  # Configuration processing job
  configure:
    runs-on: ubuntu-latest
    outputs:
      # Export key configuration values as job outputs
      input-bucket: ${{ steps.config.outputs.input-bucket }}
      output-bucket: ${{ steps.config.outputs.output-bucket }}
      k8s-namespace: ${{ steps.config.outputs.k8s-namespace }}
      k8s-cluster: ${{ steps.config.outputs.k8s-cluster }}
      environment: ${{ steps.config.outputs.environment }}
      customer-name: ${{ steps.config.outputs.customer-name }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Process Branch Configuration
        id: config
        uses: inventanalytics/actions-workflow-templates/.github/actions/process-config@main
        with:
          branch-name: ${{ github.head_ref || github.ref_name }}
          customer-name: ${{ vars.CUSTOMER_NAME || 'default-customer' }}
          customer-environment: ${{ vars.CUSTOMER_ENVIRONMENT || 'dev' }}
          customer-subdomain: ${{ vars.CUSTOMER_SUBDOMAIN || 'dev' }}
          cloud-provider: ${{ vars.CLOUD_PROVIDER || 'azure' }}
          airflow-version: ${{ vars.AIRFLOW_VERSION || '2.4.2' }}
          k8s-cluster: ${{ vars.K8S_CLUSTER }}

      - name: Export Configuration as Job Outputs
        id: export
        run: |
          # Export key values as job outputs for other jobs to use
          echo "input-bucket=$INPUT_BUCKET_NAME" >> $GITHUB_OUTPUT
          echo "output-bucket=$OUTPUT_BUCKET_NAME" >> $GITHUB_OUTPUT
          echo "k8s-namespace=$K8S_NAMESPACE" >> $GITHUB_OUTPUT
          echo "k8s-cluster=$K8S_CLUSTER" >> $GITHUB_OUTPUT
          echo "environment=$POKEDEX_ENVIRONMENT" >> $GITHUB_OUTPUT
          echo "customer-name=${{ vars.CUSTOMER_NAME }}" >> $GITHUB_OUTPUT
          
      - name: Display Applied Configuration
        run: |
          echo "## 🎯 Applied Configuration" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Branch | ${{ github.ref_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Customer | ${{ vars.CUSTOMER_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | $POKEDEX_ENVIRONMENT |" >> $GITHUB_STEP_SUMMARY
          echo "| Input Bucket | $INPUT_BUCKET_NAME |" >> $GITHUB_STEP_SUMMARY
          echo "| Output Bucket | $OUTPUT_BUCKET_NAME |" >> $GITHUB_STEP_SUMMARY
          echo "| K8s Namespace | $K8S_NAMESPACE |" >> $GITHUB_STEP_SUMMARY
          echo "| K8s Cluster | $K8S_CLUSTER |" >> $GITHUB_STEP_SUMMARY
          echo "| Maps Secret | $MAPS_DATABASE_SECRET_ID |" >> $GITHUB_STEP_SUMMARY

  # Build and test job
  build-and-test:
    runs-on: ubuntu-latest
    needs: configure
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Process Configuration
        uses: inventanalytics/actions-workflow-templates/.github/actions/process-config@main
        with:
          branch-name: ${{ github.head_ref || github.ref_name }}
          customer-name: ${{ vars.CUSTOMER_NAME || 'default-customer' }}
          customer-environment: ${{ vars.CUSTOMER_ENVIRONMENT || 'dev' }}
          customer-subdomain: ${{ vars.CUSTOMER_SUBDOMAIN || 'dev' }}
          cloud-provider: ${{ vars.CLOUD_PROVIDER || 'azure' }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Node Dependencies
        run: npm ci

      - name: Run Python Tests
        run: |
          echo "🧪 Running Python tests with configuration:"
          echo "Environment: $POKEDEX_ENVIRONMENT"
          echo "Log Level: $LOG_LEVEL"
          python -m pytest tests/ -v --log-level=$LOG_LEVEL

      - name: Run Frontend Tests
        run: |
          echo "🧪 Running frontend tests"
          npm test

      - name: Build Application
        run: |
          echo "🏗️ Building application for environment: $POKEDEX_ENVIRONMENT"
          echo "Image Environment: $IMAGE_ENV"
          # Your build commands here
          npm run build
          
      - name: Build Docker Image
        run: |
          echo "🐳 Building Docker image"
          docker build -t ${{ vars.CUSTOMER_NAME }}-app:${{ github.sha }} .
          docker tag ${{ vars.CUSTOMER_NAME }}-app:${{ github.sha }} ${{ vars.CUSTOMER_NAME }}-app:latest

  # Deploy job
  deploy:
    runs-on: ubuntu-latest
    needs: [configure, build-and-test]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/uat'
    environment: ${{ needs.configure.outputs.environment }}
    
    env:
      # Core secrets
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      
      # Application secrets
      FERNET_KEY: ${{ secrets.FERNET_KEY }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      POSTGRES_CREDENTIALS_USR: ${{ secrets.POSTGRES_CREDENTIALS_USR }}
      POSTGRES_CREDENTIALS_PSW: ${{ secrets.POSTGRES_CREDENTIALS_PSW }}
      
      # Azure-specific secrets
      AZURE_DATABRICKS_CLIENT_ID: ${{ secrets.AZURE_DATABRICKS_CLIENT_ID }}
      STORAGE_ACCOUNT_ACCESS_KEY: ${{ secrets.STORAGE_ACCOUNT_ACCESS_KEY }}
      
      # GitHub token for repository access
      GH_PAT: ${{ secrets.GH_PAT }}
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Process Configuration
        uses: inventanalytics/actions-workflow-templates/.github/actions/process-config@main
        with:
          branch-name: ${{ github.head_ref || github.ref_name }}
          customer-name: ${{ vars.CUSTOMER_NAME || 'default-customer' }}
          customer-environment: ${{ vars.CUSTOMER_ENVIRONMENT || 'dev' }}
          customer-subdomain: ${{ vars.CUSTOMER_SUBDOMAIN || 'dev' }}
          cloud-provider: ${{ vars.CLOUD_PROVIDER || 'azure' }}

      - name: Display Configuration
        run: |
          echo "✅ Configuration processed and available as environment variables"
          echo "🔧 Cloud-specific variables:"
          echo "  Azure Subscription ID: $AZURE_SUBSCRIPTION_ID"
          echo "  Azure Databricks Client ID: $AZURE_DATABRICKS_CLIENT_ID"
          echo "  Storage Account: $STORAGE_ACCOUNT_NAME"
          echo "  AWS Region: $AWS_REGION"
          echo ""
          echo "🔐 Application secrets configured:"
          echo "  Fernet Key: $([ -n "$FERNET_KEY" ] && echo "✅ Set" || echo "❌ Missing")"
          echo "  Sentry DSN: $([ -n "$SENTRY_DSN" ] && echo "✅ Set" || echo "❌ Missing")"
          echo "  PostgreSQL credentials: $([ -n "$POSTGRES_USERNAME" ] && echo "✅ Set" || echo "❌ Missing")"

      - name: Azure Login
        if: env.CLOUD_PROVIDER == 'azure'
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Configure AWS Credentials
        if: env.CLOUD_PROVIDER == 'aws'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy to Kubernetes
        run: |
          echo "🚀 Deploying to Kubernetes"
          echo "Cluster: $K8S_CLUSTER"
          echo "Namespace: $K8S_NAMESPACE"
          echo "Resource Group: $K8S_CLUSTER_RG"
          
          # Set up kubectl context
          if [ "$CLOUD_PROVIDER" = "azure" ]; then
            az aks get-credentials --resource-group $K8S_CLUSTER_RG --name $K8S_CLUSTER
          elif [ "$CLOUD_PROVIDER" = "aws" ]; then
            aws eks update-kubeconfig --region $AWS_REGION --name $K8S_CLUSTER
          fi
          
          # Apply Kubernetes manifests
          echo "📦 Applying Kubernetes manifests"
          kubectl apply -f k8s/ -n $K8S_NAMESPACE
          
          # Update deployment with new image
          kubectl set image deployment/${{ vars.CUSTOMER_NAME }}-app \
            app=${{ vars.CUSTOMER_NAME }}-app:${{ github.sha }} \
            -n $K8S_NAMESPACE
          
          # Wait for rollout to complete
          kubectl rollout status deployment/${{ vars.CUSTOMER_NAME }}-app -n $K8S_NAMESPACE

      - name: Configure Storage Buckets
        run: |
          echo "📦 Configuring storage buckets"
          echo "Input Bucket: $INPUT_BUCKET_NAME"
          echo "Output Bucket: $OUTPUT_BUCKET_NAME"
          echo "Datastore Bucket: $DATASTORE_BUCKET_NAME"
          
          # Configure buckets based on cloud provider
          if [ "$CLOUD_PROVIDER" = "azure" ]; then
            # Azure Storage Account operations
            echo "Setting up Azure Storage containers"
            az storage container create --name $INPUT_BUCKET_NAME --account-name ${{ vars.AZURE_STORAGE_ACCOUNT }}
            az storage container create --name $OUTPUT_BUCKET_NAME --account-name ${{ vars.AZURE_STORAGE_ACCOUNT }}
            az storage container create --name $DATASTORE_BUCKET_NAME --account-name ${{ vars.AZURE_STORAGE_ACCOUNT }}
          elif [ "$CLOUD_PROVIDER" = "aws" ]; then
            # AWS S3 operations
            echo "Setting up AWS S3 buckets"
            aws s3 mb s3://$INPUT_BUCKET_NAME --region $AWS_REGION || echo "Bucket already exists"
            aws s3 mb s3://$OUTPUT_BUCKET_NAME --region $AWS_REGION || echo "Bucket already exists"
            aws s3 mb s3://$DATASTORE_BUCKET_NAME --region $AWS_REGION || echo "Bucket already exists"
          fi

      - name: Update Database Configuration
        run: |
          echo "🗄️ Updating database configuration"
          echo "Maps Database Secret: $MAPS_DATABASE_SECRET_ID"
          
          # Update database connection strings or configurations
          # This could involve updating secrets in your secret store
          # or updating configuration files

      - name: Post-deployment Verification
        run: |
          echo "🔍 Running post-deployment verification"
          
          # Wait for deployment to be ready
          kubectl wait --for=condition=available --timeout=300s deployment/${{ vars.CUSTOMER_NAME }}-app -n $K8S_NAMESPACE
          
          # Check if service is responding
          SERVICE_URL=$(kubectl get service ${{ vars.CUSTOMER_NAME }}-app -n $K8S_NAMESPACE -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
          if [ -n "$SERVICE_URL" ]; then
            echo "✅ Service is available at: $SERVICE_URL"
          else
            echo "⚠️ Service URL not available yet"
          fi

      - name: Update Deployment Status
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment:** $POKEDEX_ENVIRONMENT" >> $GITHUB_STEP_SUMMARY
          echo "- **Namespace:** $K8S_NAMESPACE" >> $GITHUB_STEP_SUMMARY
          echo "- **Cluster:** $K8S_CLUSTER" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ${{ vars.CUSTOMER_NAME }}-app:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Storage:** $INPUT_BUCKET_NAME, $OUTPUT_BUCKET_NAME" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Deployment completed successfully!**" >> $GITHUB_STEP_SUMMARY

  # Cleanup job for feature branches
  cleanup:
    runs-on: ubuntu-latest
    needs: [configure, build-and-test]
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Process Configuration
        uses: inventanalytics/actions-workflow-templates/.github/actions/process-config@main
        with:
          branch-name: ${{ github.head_ref || github.ref_name }}
          customer-name: ${{ vars.CUSTOMER_NAME || 'default-customer' }}
          customer-environment: ${{ vars.CUSTOMER_ENVIRONMENT || 'dev' }}
          customer-subdomain: ${{ vars.CUSTOMER_SUBDOMAIN || 'dev' }}
          cloud-provider: ${{ vars.CLOUD_PROVIDER || 'azure' }}

      - name: Cleanup Feature Branch Resources
        if: startsWith(github.head_ref, 'feature-')
        run: |
          echo "🧹 Cleaning up resources for feature branch: ${{ github.head_ref }}"
          echo "Namespace: $K8S_NAMESPACE"
          
          # Delete namespace and all resources
          kubectl delete namespace $K8S_NAMESPACE --ignore-not-found=true
          
          # Clean up any temporary storage
          echo "Cleaned up resources for branch: ${{ github.head_ref }}" 
