name: Deploy Airflow Scheduler

on:
  workflow_call:
    inputs:
      airflow-image-version:
        description: 'Airflow image version'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ${{ vars.RUNNER_LABEL || 'runner04' }}
    env:
      AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
      STORAGE_ACCOUNT_NAME: ${{ vars.STORAGE_ACCOUNT_NAME }}
      STORAGE_ACCOUNT_ACCESS_KEY: ${{ secrets.STORAGE_ACCOUNT_ACCESS_KEY }}
      AZURE_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      FERNET_KEY: ${{ secrets.FERNET_KEY }}
      SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
      CUSTOMER_ENVIRONMENT: ${{ vars.CUSTOMER_ENVIRONMENT }}
      BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Checkout Configuration Templates
        uses: actions/checkout@v4
        with:
          repository: invent-ai/actions-workflow-templates
          path: config-templates
          ref: main
          token: ${{ secrets.GH_PAT }}

      - name: Checkout k8s Code
        uses: actions/checkout@v4
        with:
          repository: invent-ai/airflow-on-k8s-infrastructure
          path: k8s
          ref: ${{ vars.AIRFLOW_REPO_REF }}
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Set Azure subscription ID
        run: |
          case "${{ vars.CUSTOMER_ENVIRONMENT }}" in
            prod-us)
              echo "AZURE_SUBSCRIPTION_ID=${{ vars.AZURE_SUBSCRIPTION_ID_PROD_US }}" >> $GITHUB_ENV
              ;;
            prod-eu)
              echo "AZURE_SUBSCRIPTION_ID=${{ vars.AZURE_SUBSCRIPTION_ID_PROD_EU }}" >> $GITHUB_ENV
              ;;
            dev)
              echo "AZURE_SUBSCRIPTION_ID=${{ vars.AZURE_SUBSCRIPTION_ID_DEV }}" >> $GITHUB_ENV
              ;;
            *)
              echo "Unknown CUSTOMER_ENVIRONMENT: ${{ vars.CUSTOMER_ENVIRONMENT }}"
              exit 1
              ;;
          esac

      - name: Set AZURE_DATABRICKS_CLIENT_ID
        run: |
          if [[ -n "${{ secrets.AZURE_DATABRICKS_CLIENT_ID }}" ]]; then
            echo "AZURE_DATABRICKS_CLIENT_ID=${{ secrets.AZURE_DATABRICKS_CLIENT_ID }}" >> $GITHUB_ENV
          else
            echo "AZURE_DATABRICKS_CLIENT_ID=your-client-id" >> $GITHUB_ENV
          fi

      - name: Process branch configuration
        uses: invent-ai/actions-workflow-templates/.github/actions/process-config@composite-test
        with:
          branch-name: ${{ github.head_ref || github.ref_name }}
          customer-name: ${{ vars.CUSTOMER_NAME }}
          customer-environment: ${{ vars.CUSTOMER_ENVIRONMENT }}
          customer-subdomain: ${{ vars.CUSTOMER_SUBDOMAIN }}
          cloud-provider: ${{ vars.CLOUD_PROVIDER }}
          airflow-version: ${{ vars.AIRFLOW_VERSION }}
          k8s-cluster: ${{ vars.K8S_CLUSTER }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Install envsubst
        run: sudo apt-get update && sudo apt-get install -y gettext

      - name: Setup .env
        run: |
          cat .env.tpl | envsubst > .env
          cat .env

      - name: Set up Kubectl
        if: vars.CLOUD_PROVIDER == 'azure'
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'  # Install the latest version of kubectl

      - name: Install kubectl
        if: vars.CLOUD_PROVIDER == 'aws'
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
          kubectl version --client

      # Install Kustomize using curl
      - name: Install Kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh"  | bash

      # Install AWS CLI v2
      - name: Install AWS CLI v2
        if: vars.CLOUD_PROVIDER == 'aws'
        run: |
          # Install dependencies for AWS CLI v2
          sudo apt-get update
          sudo apt-get install -y unzip curl

          # Download AWS CLI v2 and install it
          curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
          unzip awscliv2.zip
          sudo ./aws/install --update || sudo ./aws/install

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        if: vars.CLOUD_PROVIDER == 'aws'
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Configure AWS EKS
        if: vars.CLOUD_PROVIDER == 'aws'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws eks --region ${{ secrets.AWS_REGION }} update-kubeconfig --name ${{ env.K8S_CLUSTER }}-eks
          # kubectl config use-context arn:aws:eks:${{ secrets.AWS_REGION }}:${{ vars.AWS_ACCOUNT_ID }}:cluster/${{ env.K8S_CLUSTER }}-eks
          aws sts get-caller-identity
          kubectl config current-context
          kubectl get ns


      - name: Deploy to AWS Kubernetes
        if: vars.CLOUD_PROVIDER == 'aws'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          ./kustomize build k8s/overlays/example-aws/ | \
            SCHEDULER_VERSION=${{ inputs.airflow-image-version }} \
            CUSTOMER_NAMESPACE=${{ env.K8S_NAMESPACE }} \
            CUSTOMER_SUBDOMAIN=${{ env.CUSTOMER_SUBDOMAIN }} \
            CUSTOMER_IMAGE_NAME=${{ vars.CUSTOMER_NAME }} \
            CUSTOMER_NAME=${{ vars.CUSTOMER_NAME }} \
            WEB_VERSION=${{ vars.AIRFLOW_VERSION }} \
            POSTGRES_USER=${{ secrets.POSTGRES_CREDENTIALS_USR }} \
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_CREDENTIALS_PSW }} \
            FERNET_KEY=${{ secrets.FERNET_KEY }} \
            CUSTOMER_ENVIRONMENT=${{ vars.CUSTOMER_ENVIRONMENT }} \
            AWS_ACCOUNT_ID=${{ vars.AWS_ACCOUNT_ID }} \
            IMAGE_ENV=${{ env.IMAGE_ENV }} \
            CUSTOMER_REMOTE_BASE_LOG_FOLDER="s3://invent-${{ env.CUSTOMER_SUBDOMAIN }}-airflow2-prod-logs/${{ env.K8S_NAMESPACE }}" \
            envsubst | \
            kubectl apply -f -

      - name: Create Environment Variables ConfigMap (AWS)
        if: vars.CLOUD_PROVIDER == 'aws'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          kubectl create configmap env-vars --from-env-file=.env --dry-run=client -o yaml | kubectl apply -f - -n $K8S_NAMESPACE

      - name: Deploy SSH Keys Secret (AWS)
        if: vars.CLOUD_PROVIDER == 'aws'
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          kubectl get secret airflow-ssh-keys -n devops -o yaml | sed "s/devops/$K8S_NAMESPACE/" | kubectl apply -n $K8S_NAMESPACE --force -f -


      - name: Set up Python
        if: vars.CLOUD_PROVIDER == 'azure'
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'  # Use your desired Python version

      - name: Install Azure CLI 2.73.0 into virtualenv
        if: vars.CLOUD_PROVIDER == 'azure'
        run: |
          python -m venv cli-env
          ./cli-env/bin/pip install --upgrade pip
          ./cli-env/bin/pip install azure-cli==2.73.0
          echo "$GITHUB_WORKSPACE/cli-env/bin" >> $GITHUB_PATH

      - name: Azure Login
        if: vars.CLOUD_PROVIDER == 'azure'
        run: |
          echo "Logging in to Azure..."
          az login --service-principal -u ${{ secrets.AZURE_CLIENT_ID }} -p ${{ secrets.AZURE_CLIENT_SECRET }} --tenant ${{ vars.AZURE_TENANT_ID }}

      - name: Set up Kubernetes CLI
        if: vars.CLOUD_PROVIDER == 'azure'
        run: |
          az aks get-credentials --subscription ${{ env.AZURE_SUBSCRIPTION_ID }} --resource-group ${{ env.K8S_CLUSTER_RG }} --name $K8S_CLUSTER-aks --admin

      - name: Configure Kubernetes Secrets (Azure)
        if: vars.CLOUD_PROVIDER == 'azure'
        run: |
          kubectl delete secret ${{ vars.CUSTOMER_NAME }}-storage-secret -n ${{ vars.CUSTOMER_NAME }} --ignore-not-found
          kubectl create ns ${{ vars.CUSTOMER_NAME }} || true
          kubectl create secret generic ${{ vars.CUSTOMER_NAME }}-storage-secret -n ${{ vars.CUSTOMER_NAME }} \
            --from-literal=azurestorageaccountkey=$STORAGE_ACCOUNT_ACCESS_KEY \
            --from-literal=azurestorageaccountname=$STORAGE_ACCOUNT_NAME

      - name: Deploy to Azure Kubernetes
        if: vars.CLOUD_PROVIDER == 'azure'
        shell: bash
        run: |
          echo "Fetching OIDC issuer..."
          OIDC_ISSUER=$(az aks show \
            --subscription $AZURE_SUBSCRIPTION_ID \
            -n ${{ env.K8S_CLUSTER }}-aks \
            -g $K8S_CLUSTER_RG \
            --query "oidcIssuerProfile.issuerUrl" -o tsv)

          echo "Fetching Managed Identity client ID..."
          IDENTITY_CLIENT_ID=$(az identity show \
            --subscription $AZURE_SUBSCRIPTION_ID \
            --resource-group "${{ vars.CUSTOMER_NAME }}-${{ vars.CUSTOMER_ENVIRONMENT }}-rg" \
            --name ${{ vars.CUSTOMER_NAME }}-identity \
            --query 'clientId' -o tsv)

          SUBJECT="system:serviceaccount:$K8S_NAMESPACE:${{ vars.CUSTOMER_NAME }}-service-account"

          echo "Checking for federated credential with matching issuer + subject..."
          FC_LIST=$(az identity federated-credential list \
            --subscription $AZURE_SUBSCRIPTION_ID \
            --identity-name ${{ vars.CUSTOMER_NAME }}-identity \
            --resource-group "${{ vars.CUSTOMER_NAME }}-${{ vars.CUSTOMER_ENVIRONMENT }}-rg" -o json)

          MATCHING_COUNT=$(echo "$FC_LIST" | jq --arg issuer "$OIDC_ISSUER" --arg subject "$SUBJECT" \
            '[.[] | select(.issuer == $issuer and .subject == $subject)] | length')

          if [ "$MATCHING_COUNT" -eq 0 ]; then
            echo "Creating federated credential '${K8S_NAMESPACE}-fc'..."
            az identity federated-credential create \
              --subscription ${{ env.AZURE_SUBSCRIPTION_ID }} \
              --name $K8S_NAMESPACE-fc \
              --identity-name ${{ vars.CUSTOMER_NAME }}-identity \
              --resource-group "${{ vars.CUSTOMER_NAME }}-${{ vars.CUSTOMER_ENVIRONMENT }}-rg" \
              --issuer $OIDC_ISSUER \
              --subject $SUBJECT
          else
            echo "Federated credential with same issuer and subject already exists. Skipping creation."
          fi

          ./kustomize build k8s/overlays/example-azure/ | \
            SCHEDULER_VERSION=${{ inputs.airflow-image-version }} \
            CUSTOMER_NAMESPACE=$K8S_NAMESPACE \
            CUSTOMER_SUBDOMAIN=${{ env.CUSTOMER_SUBDOMAIN }} \
            CUSTOMER_IMAGE_NAME=${{ vars.CUSTOMER_NAME }} \
            CUSTOMER_NAME=${{ vars.CUSTOMER_NAME }} \
            WEB_VERSION=${{ vars.AIRFLOW_VERSION }} \
            POSTGRES_USER=${{ secrets.POSTGRES_CREDENTIALS_USR }} \
            POSTGRES_PASSWORD=${{ secrets.POSTGRES_CREDENTIALS_PSW }} \
            FERNET_KEY=${{ secrets.FERNET_KEY }} \
            CUSTOMER_ENVIRONMENT=${{ vars.CUSTOMER_ENVIRONMENT }} \
            DATASTORE_BUCKET_NAME=$DATASTORE_BUCKET_NAME \
            STORAGE_ACCOUNT_NAME=$STORAGE_ACCOUNT_NAME \
            IMAGE_ENV=$IMAGE_ENV \
            CUSTOMER_REMOTE_BASE_LOG_FOLDER="s3://invent-${CUSTOMER_SUBDOMAIN}-airflow2-prod-logs/$K8S_NAMESPACE" \
            IDENTITY_CLIENT_ID=$IDENTITY_CLIENT_ID \
            envsubst | \
            kubectl apply --context ${{ env.K8S_CLUSTER }}-aks-admin -f -

      - name: Create Environment Variables ConfigMap (Azure)
        if: vars.CLOUD_PROVIDER == 'azure'
        run: |
          kubectl create configmap env-vars --from-env-file=.env --dry-run=client -o yaml | kubectl apply -f - -n $K8S_NAMESPACE

      - name: Deploy SSH Keys Secret (Azure)
        if: vars.CLOUD_PROVIDER == 'azure'
        run: |
          kubectl get secret airflow-ssh-keys -n devops -o yaml | sed "s/devops/$K8S_NAMESPACE/" | kubectl apply -n $K8S_NAMESPACE --force -f -
